services:
  # Unified listener service (handles all modes simultaneously)
  listener:
    build: ./listener
    network_mode: 'host'
    environment:
      - REDIS_URL=${REDIS_URL}
      - BLUESKY_IDENT=${BLUESKY_IDENT}
      - BLUESKY_PASS=${BLUESKY_PASS}
      - DOODLE_POLLING_FREQ_SECONDS=${DOODLE_POLLING_FREQ_SECONDS:-300}
      - HASHTAG_TO_WATCH=${HASHTAG_TO_WATCH}
      - HANDLES_TO_WATCH=${HANDLES_TO_WATCH}
    restart: unless-stopped

  # Unified frontend with path-based routing
  frontend:
    build: ./frontend
    network_mode: 'host'
    environment:
      - REDIS_URL=${REDIS_URL}
      - PORT=${PORT:-3000}
      - HASHTAG_TO_WATCH=${HASHTAG_TO_WATCH}
      - HANDLES_TO_WATCH=${HANDLES_TO_WATCH}
      - SITE_TITLE=${SITE_TITLE}
    restart: unless-stopped

